<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Product Finder</title>
  <style>
    :root {
      --blue: #0057a8;
      --yellow: #ffd23f;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7dde5;
      --light-blue: #eaf4ff;
      --light-yellow: #fff7cc;
      --warn-bg: #fff1e8;
      --warn-text: #7c2d12;
      --shadow: 0 8px 20px rgba(17, 24, 39, 0.06);

      --aisle-1: #5b8def;
      --aisle-2: #34c759;
      --aisle-3: #ff9500;
      --aisle-4: #af52de;
      --aisle-5: #ff3b30;
      --aisle-6: #00bcd4;
      --aisle-7: #8bc34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px;
    }

    .header {
      background: var(--blue);
      color: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: rgba(255,255,255,0.92);
    }

    .search-area,
    .answer-card,
    .matches,
    .map-card {
      margin-top: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .search-box {
      display: flex;
      border: 2px solid var(--blue);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 12px;
      font-size: 16px;
      min-width: 0;
    }

    .search-box button {
      border: none;
      background: var(--yellow);
      color: #111827;
      font-size: 16px;
      font-weight: 800;
      padding: 14px 18px;
      cursor: pointer;
    }

    .quick-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .quick-btn {
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      padding: 11px 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .quick-btn:hover {
      background: var(--light-blue);
      border-color: var(--blue);
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .answer-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .answer-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }

    .big-location {
      background: var(--light-yellow);
      border: 2px solid #f4bf17;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      text-align: center;
      font-weight: 900;
      color: #142b4d;
    }

    .location-chip {
      min-width: 52px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .location-segment {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid #f4bf17;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .warning {
      margin-top: 10px;
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }

    .map-help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin: -4px 0 10px;
    }

    .map-wrap {
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .store-map {
      min-width: 980px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, #fbfcfd 0%, #f7f9fb 100%);
      padding: 14px;
      display: grid;
      grid-template-columns: 108px 1fr 108px 108px;
      gap: 12px;
      align-items: stretch;
    }

    .left-zone {
      display: grid;
      grid-template-columns: 40px 68px;
      gap: 10px;
    }

    .pharmacy-zone {
      display: grid;
      grid-template-columns: 68px 40px;
      gap: 10px;
    }

    .right-med-zone {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }

    .zone-box,
    .pharmacy-box,
    .med-box {
      background: white;
      border: 3px solid #1f2937;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: #0f172a;
      position: relative;
      box-shadow: 0 2px 0 rgba(17,24,39,0.04);
    }

    .zone-box,
    .pharmacy-box {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 1px;
      padding: 8px 4px;
      font-size: 14px;
      line-height: 1.1;
      min-height: 100%;
    }

    .med-box {
      min-height: 118px;
      padding: 8px 6px;
      font-size: 14px;
      line-height: 1.1;
    }

    .map-main {
      display: grid;
      gap: 10px;
    }

    .upper-map-group {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .upper-aisles,
    .lower-aisles {
      display: grid;
      gap: 10px;
    }

    /* 关键修改：Till 2 在 Household 的右下方 */
    .upper-side-stack {
      display: grid;
      grid-template-columns: 0.42fr 1fr;
      grid-template-rows: 1fr 64px;
      gap: 8px;
      min-height: 100%;
    }

    .upper-side-empty {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
    }

    .household-box,
    .till2-box {
      border: 2px solid #243041;
      border-radius: 14px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      font-weight: 900;
      color: #142b4d;
      box-shadow: 0 2px 0 rgba(17,24,39,0.04);
    }

    .household-box {
      grid-column: 1 / 3;
      grid-row: 1 / 2;
      font-size: 18px;
    }

    .till2-box {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      font-size: 16px;
    }

    .aisle-block {
      border-radius: 14px;
      padding: 4px;
      transition: 0.2s ease;
    }

    .aisle-block.active-aisle {
      background: #fff9df;
      box-shadow: inset 0 0 0 2px #ffe38a;
    }

    .aisle-body {
      display: grid;
      grid-template-rows: 42px 18px 42px;
      gap: 6px;
    }

    .shelf-side {
      display: grid;
      gap: 8px;
    }

    .shelf-side.two { grid-template-columns: repeat(2, 1fr); }
    .shelf-side.three { grid-template-columns: repeat(3, 1fr); }

    .shelf-section {
      background: white;
      border: 2px solid #243041;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      padding: 4px 6px;
      position: relative;
      transition: 0.2s ease;
    }

    .target-section {
      background: var(--yellow) !important;
      border-color: #111827 !important;
      box-shadow:
        0 0 0 4px rgba(255, 210, 63, 0.35),
        0 4px 10px rgba(0,0,0,0.08);
      z-index: 2;
      overflow: hidden;
      padding: 0;
    }

    .target-section::after {
      content: "HERE";
      position: absolute;
      top: -12px;
      right: 6px;
      background: #111827;
      color: white;
      font-size: 9px;
      font-weight: 900;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.4px;
      z-index: 5;
    }

    .section-detail {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      padding: 3px;
    }

    .section-cell {
      border-radius: 5px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(17, 24, 39, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 900;
      color: rgba(17,24,39,0.5);
    }

    .section-cell.target-cell {
      background: #111827;
      color: white;
      border-color: #111827;
      font-size: 10px;
    }

    .walkway {
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.6px;
    }

    .target {
      background: var(--yellow) !important;
      border-color: #111827 !important;
      box-shadow:
        0 0 0 4px rgba(255, 210, 63, 0.35),
        0 4px 10px rgba(0,0,0,0.08);
      z-index: 2;
    }

    .target::after {
      content: "HERE";
      position: absolute;
      top: -12px;
      right: 6px;
      background: #111827;
      color: white;
      font-size: 9px;
      font-weight: 900;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.4px;
    }

    .match-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: white;
      cursor: pointer;
    }

    .match-item:last-child { margin-bottom: 0; }

    .match-item:hover,
    .match-item.active {
      background: var(--light-blue);
      border-color: var(--blue);
    }

    .match-title {
      display: block;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 6px;
      color: var(--text);
      line-height: 1.25;
    }

    .match-location {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .aisle-mini-chip {
      display: inline-flex;
      min-width: 34px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      color: white;
      font-weight: 900;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
      background: white;
    }

    @media (max-width: 820px) {
      .quick-buttons { grid-template-columns: repeat(2, 1fr); }
      .location-segment { font-size: 13px; }
      .store-map { min-width: 980px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <h1>Find a product</h1>
      <p>Search by product, brand, symptom, or category.</p>
    </section>

    <section class="search-area">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search: vitamin C, Panadol, cough, Swisse..." autocomplete="off" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="quick-buttons" id="quickButtons"></div>
    </section>

    <section id="answerBox"></section>

    <section class="map-card">
      <h2 class="card-title">Map</h2>
      <p class="map-help">Yellow = target section. Dark cell = exact area inside that section.</p>

      <div class="map-wrap">
        <div class="store-map">
          <div class="left-zone" id="leftZones"></div>

          <div class="map-main">
            <div class="upper-map-group">
              <div class="upper-aisles" id="upperAisleMap"></div>

              <div class="upper-side-stack">
                <div class="household-box" id="householdBox">Household</div>
                <div class="upper-side-empty" aria-hidden="true"></div>
                <div class="till2-box" id="till2Box">Till 2</div>
              </div>
            </div>

            <div class="lower-aisles" id="lowerAisleMap"></div>
          </div>

          <div class="right-med-zone" id="rightMedZones"></div>
          <div class="pharmacy-zone" id="pharmacyZones"></div>
        </div>
      </div>
    </section>

    <section class="matches">
      <h2 class="card-title">Other matches</h2>
      <div id="resultList"></div>
    </section>
  </main>

    const upperAisleMap = document.getElementById("upperAisleMap");
    const lowerAisleMap = document.getElementById("lowerAisleMap");
    const leftZonesBox = document.getElementById("leftZones");
    const rightMedZonesBox = document.getElementById("rightMedZones");
    const pharmacyZonesBox = document.getElementById("pharmacyZones");
    const resultList = document.getElementById("resultList");

    function getAisleColor(aisleNumber) {
      const colorMap = {
        1: "var(--aisle-1)",
        2: "var(--aisle-2)",
        3: "var(--aisle-3)",
        4: "var(--aisle-4)",
        5: "var(--aisle-5)",
        6: "var(--aisle-6)",
        7: "var(--aisle-7)"
      };
      return colorMap[aisleNumber] || "var(--blue)";
    }

    function capitalize(word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }

    function displayHorizontal(value) {
      return value === "middle" ? "Center" : capitalize(value);
    }

    function displayVertical(value) {
      return value === "middle" ? "Middle Shelf" : `${capitalize(value)} Shelf`;
    }

    function buildQuickButtons() {
      quickButtonsBox.innerHTML = "";
      quickButtons.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "quick-btn";
        btn.textContent = item.label;
        btn.onclick = () => {
          searchInput.value = item.key;
          searchItems();
        };
        quickButtonsBox.appendChild(btn);
      });
    }

    function getLocationText(item) {
      if (item.areaType === "aisle") {
        return `A${item.aisle} · ${item.sectionLabel} · ${displayHorizontal(item.horizontal)} · ${displayVertical(item.vertical)}`;
      }
      if (item.areaType === "right-med") return `Right Side · ${item.sectionLabel}`;
      if (item.areaType === "pharmacy") return "Pharmacist";
      return "";
    }

    function makeZoneBox(zone, isTarget, className) {
      const div = document.createElement("div");
      div.className = `${className} ${isTarget ? "target" : ""}`;
      div.textContent = zone.label;
      return div;
    }

    function buildLeftZones() {
      leftZonesBox.innerHTML = "";
      leftZones.forEach(zone => leftZonesBox.appendChild(makeZoneBox(zone, false, "zone-box")));
    }

    function buildRightMedZones(targetItem) {
      rightMedZonesBox.innerHTML = "";
      rightMedZones.forEach(zone => {
        const isTarget = targetItem && targetItem.areaType === "right-med" && targetItem.zoneId === zone.id;
        rightMedZonesBox.appendChild(makeZoneBox(zone, isTarget, "med-box"));
      });
    }

    function buildPharmacyZones(targetItem) {
      pharmacyZonesBox.innerHTML = "";
      pharmacyZones.forEach(zone => {
        const isTarget = targetItem && targetItem.areaType === "pharmacy" && targetItem.zoneId === zone.id;
        pharmacyZonesBox.appendChild(makeZoneBox(zone, isTarget, "pharmacy-box"));
      });
    }

    function cellKey(horizontal, vertical) {
      return `${horizontal}-${vertical}`;
    }

    function buildSectionDetail(item) {
      const horizontals = ["left", "middle", "right"];
      const verticals = ["top", "middle", "bottom"];
      let html = `<div class="section-detail">`;

      verticals.forEach(vertical => {
        horizontals.forEach(horizontal => {
          const isTargetCell = cellKey(horizontal, vertical) === cellKey(item.horizontal, item.vertical);
          html += `<div class="section-cell ${isTargetCell ? "target-cell" : ""}">${isTargetCell ? "ITEM" : ""}</div>`;
        });
      });

      html += `</div>`;
      return html;
    }

    function buildShelfSide(sections, sideName, aisleNumber, targetItem) {
      const countClass = sections.length === 2 ? "two" : "three";

      const html = sections.map(section => {
        const isTarget =
          targetItem &&
          targetItem.areaType === "aisle" &&
          targetItem.aisle === aisleNumber &&
          targetItem.side === sideName &&
          targetItem.section === section.id;

        if (isTarget) {
          return `<div class="shelf-section target-section">${buildSectionDetail(targetItem)}</div>`;
        }

        return `<div class="shelf-section">${section.label}</div>`;
      }).join("");

      return `<div class="shelf-side ${countClass}">${html}</div>`;
    }

    function buildAisleGroup(container, aisleList, targetItem) {
      container.innerHTML = "";
      aisleList.forEach(aisle => {
        const isActiveAisle =
          targetItem &&
          targetItem.areaType === "aisle" &&
          targetItem.aisle === aisle.aisle;

        const aisleColor = getAisleColor(aisle.aisle);
        const row = document.createElement("div");
        row.className = `aisle-block ${isActiveAisle ? "active-aisle" : ""}`;
        row.innerHTML = `
          <div class="aisle-body">
            ${buildShelfSide(aisle.top, "top", aisle.aisle, targetItem)}
            <div class="walkway" style="background:${aisleColor};">A${aisle.aisle}</div>
            ${buildShelfSide(aisle.bottom, "bottom", aisle.aisle, targetItem)}
          </div>
        `;
        container.appendChild(row);
      });
    }

    function buildMap(targetItem) {
      buildLeftZones();
      buildAisleGroup(upperAisleMap, aisles.filter(a => a.aisle <= 3), targetItem);
      buildAisleGroup(lowerAisleMap, aisles.filter(a => a.aisle >= 4), targetItem);
      buildRightMedZones(targetItem);
      buildPharmacyZones(targetItem);
    }

    function renderAnswer(item) {
      let locationHTML = "";

      if (item.areaType === "aisle") {
        const aisleColor = getAisleColor(item.aisle);
        locationHTML = `
          <div class="big-location">
            <span class="location-chip" style="background:${aisleColor}">A${item.aisle}</span>
            <span class="location-segment">${item.sectionLabel}</span>
            <span class="location-segment">${displayHorizontal(item.horizontal)}</span>
            <span class="location-segment">${displayVertical(item.vertical)}</span>
          </div>
        `;
      } else if (item.areaType === "right-med") {
        locationHTML = `
          <div class="big-location">
            <span class="location-segment">Right Side</span>
            <span class="location-segment">${item.sectionLabel}</span>
            <span class="location-segment">${displayHorizontal(item.horizontal)}</span>
            <span class="location-segment">${displayVertical(item.vertical)}</span>
          </div>
        `;
      } else if (item.areaType === "pharmacy") {
        locationHTML = `
          <div class="big-location">
            <span class="location-segment">Pharmacist</span>
          </div>
        `;
      }

      answerBox.innerHTML = `
        <section class="answer-card">
          <div class="answer-label">Best match</div>
          <h2 class="answer-title">${item.title}</h2>
          ${locationHTML}
          ${item.advice ? `<div class="warning">Ask staff if needed.</div>` : ""}
        </section>
      `;
    }

    function renderResults(list, activeId) {
      if (list.length <= 1) {
        resultList.innerHTML = `<div class="empty">No other matches.</div>`;
        return;
      }

      resultList.innerHTML = "";
      list.forEach(item => {
        const div = document.createElement("div");
        div.className = `match-item ${item.id === activeId ? "active" : ""}`;

        if (item.areaType === "aisle") {
          const aisleColor = getAisleColor(item.aisle);
          div.innerHTML = `
            <span class="match-title">${item.title}</span>
            <div class="match-location">
              <span class="aisle-mini-chip" style="background:${aisleColor};">A${item.aisle}</span>
              <span>${item.sectionLabel} · ${displayHorizontal(item.horizontal)} · ${displayVertical(item.vertical)}</span>
            </div>
          `;
        } else {
          div.innerHTML = `
            <span class="match-title">${item.title}</span>
            <div class="match-location"><span>${getLocationText(item)} · ${item.type}</span></div>
          `;
        }

        div.onclick = () => selectItem(item, list);
        resultList.appendChild(div);
      });
    }

    function selectItem(item, list) {
      renderAnswer(item);
      buildMap(item);
      renderResults(list || [item], item.id);
    }

    function searchItems() {
      const query = searchInput.value.trim().toLowerCase();
      let results;

      if (!query) {
        results = items;
      } else {
        const tokens = query.split(/\s+/).filter(Boolean);
        results = items.filter(item => {
          const text = `${item.title} ${item.type} ${item.keywords} ${item.sectionLabel}`.toLowerCase();
          return tokens.some(token => text.includes(token));
        });
      }

      if (results.length === 0) {
        answerBox.innerHTML = `
          <section class="answer-card">
            <div class="empty">No result found.<br>Try product name, brand name, symptom, or category.</div>
          </section>
        `;
        buildMap(null);
        resultList.innerHTML = "";
        return;
      }

      selectItem(results[0], results);
    }

    searchBtn.addEventListener("click", searchItems);
    searchInput.addEventListener("input", searchItems);

    buildQuickButtons();
    selectItem(items[0], items);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Product Finder</title>

  <!-- Recommended: download these two files and keep them in the same folder as index.html -->
  <script src="papaparse.min.js"></script>
  <script src="fuse.min.js"></script>

  <style>
    :root {
      --blue: #0057a8;
      --yellow: #ffd23f;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7dde5;
      --light-blue: #eaf4ff;
      --light-yellow: #fff7cc;
      --warn-bg: #fff1e8;
      --warn-text: #7c2d12;
      --shadow: 0 8px 20px rgba(17, 24, 39, 0.06);

      --aisle-1: #5b8def;
      --aisle-2: #34c759;
      --aisle-3: #ff9500;
      --aisle-4: #af52de;
      --aisle-5: #ff3b30;
      --aisle-6: #00bcd4;
      --aisle-7: #8bc34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px;
    }

    .served-counter {
      margin-bottom: 10px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--blue);
      box-shadow: var(--shadow);
    }

    .header {
      background: var(--blue);
      color: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      color: rgba(255,255,255,0.92);
    }

    .search-area,
    .answer-card,
    .matches,
    .map-card {
      margin-top: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .search-box {
      display: flex;
      border: 2px solid var(--blue);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 12px;
      font-size: 16px;
      min-width: 0;
    }

    .search-box button {
      border: none;
      background: var(--yellow);
      color: #111827;
      font-size: 16px;
      font-weight: 800;
      padding: 14px 18px;
      cursor: pointer;
    }


    .card-title { margin: 0 0 10px; font-size: 18px; }

    .answer-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .answer-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }

    .big-location {
      background: var(--light-yellow);
      border: 2px solid #f4bf17;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      text-align: center;
      font-weight: 900;
      color: #142b4d;
    }

    .location-chip {
      min-width: 52px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .location-segment {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid #f4bf17;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .warning {
      margin-top: 10px;
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }

    .map-help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin: -4px 0 10px;
    }

    .map-wrap {
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .store-map {
      min-width: 980px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, #fbfcfd 0%, #f7f9fb 100%);
      padding: 14px;
      display: grid;
      grid-template-columns: 108px 1fr 108px 108px;
      gap: 12px;
      align-items: stretch;
    }

    .left-zone {
      display: grid;
      grid-template-columns: 40px 68px;
      gap: 10px;
    }

    .pharmacy-zone {
      display: grid;
      grid-template-columns: 68px 40px;
      gap: 10px;
    }

    .right-med-zone {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }

    .zone-box,
    .pharmacy-box,
    .med-box,
    .household-box,
    .till2-box {
      background: white;
      border: 3px solid #1f2937;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: #0f172a;
      position: relative;
      box-shadow: 0 2px 0 rgba(17,24,39,0.04);
    }

    .zone-box,
    .pharmacy-box {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 1px;
      padding: 8px 4px;
      font-size: 14px;
      line-height: 1.1;
      min-height: 100%;
    }

    .med-box {
      min-height: 118px;
      padding: 8px 6px;
      font-size: 14px;
      line-height: 1.1;
    }

    .map-main { display: grid; gap: 10px; }

    .upper-map-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-items: stretch;
    }

    .upper-aisles,
    .lower-aisles {
      display: grid;
      gap: 10px;
    }

    .upper-aisles {
      grid-column: 1 / 3;
    }

    .upper-side-stack {
      grid-column: 3 / 4;
      display: grid;
      grid-template-columns: 0.72fr 1fr;
      /* Match the exact vertical rhythm of the A1/A2/A3 aisle blocks:
         each aisle block is 122px high including its 4px padding, and aisle blocks are 10px apart.
         The last three rows mirror A3 top / walkway / bottom, so Vita C aligns with Kids. */
      grid-template-rows: 126px 126px 42px 18px 42px;
      gap: 7px;
      min-height: 100%;
    }

    .upper-side-empty { display: none; }

    .household-box {
      grid-column: 1 / 2;
      grid-row: 1 / 4;
      font-size: 18px;
      line-height: 1.25;
      color: #142b4d;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .household-box.household-active {
      font-size: 11px;
      line-height: 1.1;
      padding: 6px;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
      align-items: stretch;
      justify-content: stretch;
    }

    .household-box.household-active.household-target {
      background: var(--yellow) !important;
      border-color: #111827 !important;
      box-shadow: 0 0 0 4px rgba(255, 210, 63, 0.35), 0 4px 10px rgba(0,0,0,0.08);
      z-index: 2;
      overflow: hidden;
      padding: 4px;
    }

    .household-box.household-active.household-target::after {
      content: "HERE";
      position: absolute;
      top: -12px;
      right: 6px;
      background: #111827;
      color: white;
      font-size: 9px;
      font-weight: 900;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.4px;
      z-index: 5;
    }

    .household-part {
      border: 1px solid rgba(17, 24, 39, 0.35);
      border-radius: 8px;
      background: rgba(255,255,255,0.75);
      padding: 3px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 3px;
      min-height: 0;
    }

    .household-part-title {
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      color: #142b4d;
    }

    .household-cells {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      min-height: 0;
    }

    .household-cell {
      border-radius: 5px;
      background: white;
      border: 1px solid rgba(17, 24, 39, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 8px;
      font-weight: 900;
      color: rgba(17,24,39,0.55);
      position: relative;
      min-height: 0;
    }

    .household-cell.target-household-cell {
      background: #111827;
      color: white;
      border-color: #111827;
      font-size: 9px;
    }

    .till2-box {
      grid-column: 2 / 3;
      grid-row: 3 / 4;
      font-size: 18px;
      color: #142b4d;
    }

    .a3-b3-box {
      grid-column: 1 / 3;
      grid-row: 5 / 6;
      width: 100%;
      height: 42px;
      min-height: 42px;
      width: 100%;
      background: white;
      border: 2px solid #243041;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      padding: 4px 6px;
      position: relative;
      transition: 0.2s ease;
      color: #0f172a;
      box-sizing: border-box;
    }

    .aisle-block {
      border-radius: 14px;
      padding: 4px;
      transition: 0.2s ease;
    }

    .aisle-block.active-aisle {
      background: #fff9df;
      box-shadow: inset 0 0 0 2px #ffe38a;
    }

    .aisle-body {
      display: grid;
      grid-template-rows: 42px 18px 42px;
      gap: 6px;
    }

    .shelf-side { display: grid; gap: 8px; }
    .shelf-side.two { grid-template-columns: repeat(2, 1fr); }
    .shelf-side.three { grid-template-columns: repeat(3, 1fr); }

    .shelf-section {
      background: white;
      border: 2px solid #243041;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      padding: 4px 6px;
      position: relative;
      transition: 0.2s ease;
    }

    .target-section {
      background: var(--yellow) !important;
      border-color: #111827 !important;
      box-shadow: 0 0 0 4px rgba(255, 210, 63, 0.35), 0 4px 10px rgba(0,0,0,0.08);
      z-index: 2;
      overflow: hidden;
      padding: 0;
    }

    .target-section::after,
    .target::after {
      content: "HERE";
      position: absolute;
      top: -12px;
      right: 6px;
      background: #111827;
      color: white;
      font-size: 9px;
      font-weight: 900;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.4px;
      z-index: 5;
    }

    .section-detail {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      padding: 3px;
    }

    .section-cell {
      border-radius: 5px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(17, 24, 39, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 900;
      color: rgba(17,24,39,0.5);
    }

    .section-cell.target-cell {
      background: #111827;
      color: white;
      border-color: #111827;
      font-size: 10px;
    }

    .walkway {
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.6px;
    }

    .target {
      background: var(--yellow) !important;
      border-color: #111827 !important;
      box-shadow: 0 0 0 4px rgba(255, 210, 63, 0.35), 0 4px 10px rgba(0,0,0,0.08);
      z-index: 2;
    }

    .match-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: white;
      cursor: pointer;
    }

    .match-item:last-child { margin-bottom: 0; }
    .match-item:hover, .match-item.active { background: var(--light-blue); border-color: var(--blue); }

    .match-title {
      display: block;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 6px;
      color: var(--text);
      line-height: 1.25;
    }

    .match-location {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .aisle-mini-chip {
      display: inline-flex;
      min-width: 34px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      color: white;
      font-weight: 900;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
      background: white;
    }

    .loading { color: var(--muted); font-weight: 700; line-height: 1.5; }

    @media (max-width: 820px) {
      .location-segment { font-size: 13px; }
      .store-map { min-width: 980px; }
    }
  </style>
</head>
<body>
  <main class="page">

    <section class="header">
      <h1>Find a product</h1>
      <p>Search by product, brand, symptom, ingredient, or category.</p>
    </section>

    <section class="search-area">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search: vitamin C, Panadol, cough, Swisse..." autocomplete="off" />
        <button id="searchBtn">Search</button>
      </div>
    </section>

    <section id="answerBox"></section>

    <section class="map-card">
      <h2 class="card-title">Map</h2>
      <p class="map-help">Yellow = target section. Dark cell = exact area inside that section.</p>
      <div class="map-wrap">
        <div class="store-map">
          <div class="left-zone" id="leftZones"></div>

          <div class="map-main">
            <div class="upper-map-group">
              <div class="upper-aisles" id="upperAisleMap"></div>
              <div class="upper-side-stack">
                <div class="household-box" id="householdBox">Household</div>
                <div class="upper-side-empty" aria-hidden="true"></div>
                <div class="till2-box" id="till2Box">Till 2</div>
                <div class="a3-b3-box" id="a3b3Box">Vita C</div>
              </div>
            </div>
            <div class="lower-aisles" id="lowerAisleMap"></div>
          </div>

          <div class="right-med-zone" id="rightMedZones"></div>
          <div class="pharmacy-zone" id="pharmacyZones"></div>
        </div>
      </div>
    </section>

    <section class="matches">
      <h2 class="card-title">Other matches</h2>
      <div id="resultList"></div>
    <div class="served-counter" id="servedCounter">Currently served 0 customers</div>
    </section>
  </main>

  <script>
    const CSV_FILES = {
      products: "products.csv",
      productGroups: "product_groups.csv",
      locations: "locations.csv",
      synonyms: "synonyms.csv",
      rules: "rules.csv"
    };

    const aisles = [
      { aisle: 1, top: [{ id: "T1", label: "Beauty" }, { id: "T2", label: "Beauty" }], bottom: [{ id: "B1", label: "Nail Polish" }, { id: "B2", label: "Adult Pads" }] },
      { aisle: 2, top: [{ id: "T1", label: "Baby Skin&Wipes" }, { id: "T2", label: "Baby Nappies" }], bottom: [{ id: "B1", label: "Baby Teats&Soothers" }, { id: "B2", label: "Baby Formula&Food" }] },
      { aisle: 3, top: [{ id: "T1", label: "Men & Family Planning" }, { id: "T2", label: "Oral Care" }], bottom: [{ id: "B1", label: "Footcare" }, { id: "B2", label: "First Aid" }] },
      { aisle: 4, top: [{ id: "T1", label: "Shampoo&Conditioner" }, { id: "T2", label: "Hair Styling&Treatments" }, { id: "T3", label: "Eye&Ear Care" }], bottom: [{ id: "B1", label: "Hair Colour" }, { id: "B2", label: "Travel&Cotton Care" }, { id: "B3", label: "Digestive Health" }] },
      { aisle: 5, top: [{ id: "T1", label: "Facial Skincare" }, { id: "T2", label: "Sensitive Skin&Body Care" }, { id: "T3", label: "Hair Removal&Deodorant" }], bottom: [{ id: "B1", label: "Anti-Ageing Skincare" }, { id: "B2", label: "Bath&Body" }, { id: "B3", label: "Sun Care&Insect Repellent" }] },
      { aisle: 6, top: [{ id: "T1", label: "Supplements" }, { id: "T2", label: "Supplements" }, { id: "T3", label: "Supplements" }], bottom: [{ id: "B1", label: "Go Healthy & Solgar" }, { id: "B2", label: "Supplements" }, { id: "B3", label: "Supplements" }] },
      { aisle: 7, top: [{ id: "T1", label: "Supplements" }, { id: "T2", label: "Protein Bars & Snacks" }, { id: "T3", label: "Supplements" }], bottom: [{ id: "B1", label: "Perfume" }, { id: "B2", label: "Sports Nutrition" }, { id: "B3", label: "Supplements" }] }
    ];

    const leftZones = [
      { id: "front-door", label: "Front Door" },
      { id: "checkout", label: "Checkout" }
    ];

    const rightMedZones = [
      { id: "pain-relief", label: "Pain Relief" },
      { id: "cold-flu", label: "Pain Relief" },
      { id: "cough-syrup", label: "Cold & Flu" },
      { id: "sore-throat", label: "Cold & Flu" }
    ];

    const pharmacyZones = [
      { id: "pharmacist", label: "Pharmacist" },
      { id: "back-door", label: "Back Door" }
    ];

    let items = [];
    let fuse = null;
    let synonymIndex = [];
    let locationsById = new Map();
    let rulesById = new Map();
    let searchTimer = null;
    let lastSearchQuery = null;
    let lastSearchResults = [];

    const servedCounter = document.getElementById("servedCounter");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const answerBox = document.getElementById("answerBox");
    const upperAisleMap = document.getElementById("upperAisleMap");
    const lowerAisleMap = document.getElementById("lowerAisleMap");
    const leftZonesBox = document.getElementById("leftZones");
    const rightMedZonesBox = document.getElementById("rightMedZones");
    const pharmacyZonesBox = document.getElementById("pharmacyZones");
    const resultList = document.getElementById("resultList");
    const householdBox = document.getElementById("householdBox");
    const till2Box = document.getElementById("till2Box");
    const a3b3Box = document.getElementById("a3b3Box");

    function updateServedCounter() {
      const key = "storeFinderOpenCount";
      const count = Number(localStorage.getItem(key) || "0") + 1;
      localStorage.setItem(key, String(count));
      servedCounter.textContent = `Currently served ${count} customers`;
    }

    function getAisleColor(aisleNumber) {
      const colorMap = {
        1: "var(--aisle-1)",
        2: "var(--aisle-2)",
        3: "var(--aisle-3)",
        4: "var(--aisle-4)",
        5: "var(--aisle-5)",
        6: "var(--aisle-6)",
        7: "var(--aisle-7)"
      };
      return colorMap[aisleNumber] || "var(--blue)";
    }

    function normalize(value) {
      return value === undefined || value === null ? "" : String(value).trim();
    }

    function normalizeKey(value) {
      return normalize(value).toLowerCase();
    }

    function parseBool(value) {
      const v = normalizeKey(value);
      return ["true", "yes", "y", "1"].includes(v);
    }

    function parsePriority(value) {
      const n = Number(normalize(value));
      return Number.isFinite(n) ? n : 0;
    }

    function capitalize(word) {
      const v = normalize(word);
      return v ? v.charAt(0).toUpperCase() + v.slice(1).toLowerCase() : "";
    }

    function displayHorizontal(value) {
      const v = normalizeKey(value);
      if (v === "middle" || v === "center") return "Center";
      return capitalize(v || "middle");
    }

    function displayVertical(value) {
      const v = normalizeKey(value) || "middle";
      if (v === "middle") return "Middle Shelf";
      return `${capitalize(v)} Shelf`;
    }

    function cleanRow(row) {
      const cleaned = {};
      Object.entries(row || {}).forEach(([key, value]) => {
        const cleanKey = normalize(key);
        if (!cleanKey) return;
        cleaned[cleanKey] = normalize(value);
      });
      return cleaned;
    }

    function readCSV(url, required = true) {
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: results => resolve((results.data || []).map(cleanRow)),
          error: error => required ? reject(error) : resolve([])
        });
      });
    }

    function splitTerms(value) {
      return normalize(value)
        .split(/[,;|]/)
        .map(term => term.trim().toLowerCase())
        .filter(Boolean);
    }

    function buildSynonymIndex(rows) {
      return rows.map(row => {
        const term = normalizeKey(row.term);
        const synonyms = splitTerms(row.synonyms);
        const allTerms = Array.from(new Set([term, ...synonyms].filter(Boolean)));
        return { term, allTerms, searchBoost: normalizeKey(row.searchBoost || "medium") };
      }).filter(row => row.allTerms.length);
    }

    function expandQueryWithSynonyms(query) {
      const original = normalizeKey(query);
      if (!original) return "";
      const expanded = new Set(original.split(/\s+/).filter(Boolean));
      expanded.add(original);

      synonymIndex.forEach(entry => {
        const matched = entry.allTerms.some(term => original === term || original.includes(term) || term.includes(original));
        if (matched) entry.allTerms.forEach(term => expanded.add(term));
      });

      return Array.from(expanded).join(" ");
    }

    function mergeData(product, group, location, rule) {
      const merged = { ...(group || {}), ...(product || {}) };
      const loc = location || {};
      const r = rule || {};

      merged.productId = normalize(merged.productId || merged.id || `${merged.groupId || "item"}-${Math.random().toString(36).slice(2)}`);
      merged.id = merged.productId;
      merged.status = normalizeKey(merged.status || "active");
      merged.title = normalize(merged.title || merged.displayName || merged.groupName || loc.sectionLabel || "Untitled");
      merged.displayName = normalize(merged.displayName || merged.title);
      merged.brand = normalize(merged.brand || merged.brandScope || "");
      merged.priority = parsePriority(merged.priority || group?.priority || 0);

      merged.locationId = normalize(merged.locationId || group?.locationId || "");
      merged.ruleId = normalize(merged.ruleId || group?.ruleId || "");

      merged.areaType = normalizeKey(loc.areaType || merged.areaType || "aisle");
      merged.aisle = normalize(loc.aisle || merged.aisle);
      merged.side = normalizeKey(loc.side || merged.side || "top");
      merged.section = normalize(loc.section || merged.section);
      merged.sectionLabel = normalize(loc.sectionLabel || merged.sectionLabel || merged.subcategory || merged.groupName || "");
      merged.zoneId = normalizeKey(loc.zoneId || merged.zoneId || "");
      merged.bay = normalize(loc.bay || merged.bay || "");
      merged.horizontal = normalizeKey(loc.horizontal || merged.horizontal || "middle");
      merged.vertical = normalizeKey(loc.vertical || merged.vertical || "middle");
      merged.locationDisplay = normalize(loc.locationDisplay || "");
      merged.shelfNote = normalize(loc.shelfNote || merged.shelfNote || "");
      merged.mapLabel = normalize(loc.mapLabel || "");

      merged.ruleMessage = normalize(r.message || "");
      merged.advice = parseBool(r.advice || merged.advice);
      merged.ageRestricted = parseBool(r.ageRestricted || merged.ageRestricted);
      merged.pharmacistOnly = parseBool(r.pharmacistOnly || merged.pharmacistOnly);
      merged.showWarning = parseBool(r.showWarning || merged.advice || merged.ageRestricted || merged.pharmacistOnly);

      merged.searchText = [
        merged.title,
        merged.displayName,
        merged.brand,
        merged.groupName,
        merged.groupType,
        merged.department,
        merged.category,
        merged.subcategory,
        merged.needType,
        merged.brandScope,
        merged.symptoms,
        merged.aliases,
        merged.keywords,
        merged.activeIngredient,
        merged.targetCustomer,
        merged.variant,
        merged.series,
        merged.size,
        merged.packSize,
        merged.flavour,
        merged.format,
        merged.strength,
        merged.ageRange,
        merged.gender,
        merged.barcode,
        merged.keywordsExtra
      ].map(normalize).filter(Boolean).join(" ");

      return merged;
    }

    function prepareSearchCache(item) {
      item._titleKey = normalizeKey(item.title);
      item._displayNameKey = normalizeKey(item.displayName);
      item._brandKey = normalizeKey(item.brand);
      item._aliasesKey = normalizeKey(item.aliases);
      item._symptomsKey = normalizeKey(item.symptoms);
      item._keywordsKey = normalizeKey(`${item.keywords} ${item.keywordsExtra}`);
      item._activeIngredientKey = normalizeKey(item.activeIngredient);
      item._searchTextKey = normalizeKey(item.searchText);
      return item;
    }

    async function loadData() {
      answerBox.innerHTML = `<section class="answer-card"><div class="loading">Loading product data...</div></section>`;
      buildMap(null);

      const [productRows, groupRows, locationRows, synonymRows, ruleRows] = await Promise.all([
        readCSV(CSV_FILES.products),
        readCSV(CSV_FILES.productGroups),
        readCSV(CSV_FILES.locations),
        readCSV(CSV_FILES.synonyms, false),
        readCSV(CSV_FILES.rules, false)
      ]);

      synonymIndex = buildSynonymIndex(synonymRows);
      locationsById = new Map(locationRows.map(row => [normalize(row.locationId), row]).filter(([id]) => id));
      rulesById = new Map(ruleRows.map(row => [normalize(row.ruleId), row]).filter(([id]) => id));

      const groupsById = new Map(groupRows.map(row => [normalize(row.groupId), row]).filter(([id]) => id));
      const productGroupIds = new Set(productRows.map(row => normalize(row.groupId)).filter(Boolean));

      const productItems = productRows.map(product => {
        const group = groupsById.get(normalize(product.groupId)) || {};
        const location = locationsById.get(normalize(group.locationId || product.locationId)) || {};
        const rule = rulesById.get(normalize(group.ruleId || product.ruleId)) || {};
        return mergeData(product, group, location, rule);
      });

      const categoryItems = groupRows
        .filter(group => !productGroupIds.has(normalize(group.groupId)))
        .map(group => {
          const location = locationsById.get(normalize(group.locationId)) || {};
          const rule = rulesById.get(normalize(group.ruleId)) || {};
          return mergeData({
            productId: `group-${normalize(group.groupId)}`,
            title: group.groupName,
            displayName: group.groupName,
            status: group.status || "active"
          }, group, location, rule);
        });

      items = [...productItems, ...categoryItems]
        .filter(item => !["inactive", "disabled", "hide"].includes(item.status))
        .map(prepareSearchCache);

      fuse = new Fuse(items, {
        includeScore: true,
        ignoreLocation: true,
        threshold: 0.38,
        distance: 100,
        minMatchCharLength: 2,
        keys: [
          { name: "title", weight: 0.35 },
          { name: "displayName", weight: 0.30 },
          { name: "brand", weight: 0.22 },
          { name: "aliases", weight: 0.18 },
          { name: "symptoms", weight: 0.16 },
          { name: "keywords", weight: 0.14 },
          { name: "keywordsExtra", weight: 0.12 },
          { name: "activeIngredient", weight: 0.12 },
          { name: "groupName", weight: 0.10 },
          { name: "barcode", weight: 0.10 },
          { name: "searchText", weight: 0.04 }
        ]
      });

      if (!items.length) {
        answerBox.innerHTML = `<section class="answer-card"><div class="empty">No active products found. Check your CSV files.</div></section>`;
        resultList.innerHTML = "";
        return;
      }

      const initialList = [...items].sort(sortByPriority).slice(0, 8);
      selectItem(initialList[0], initialList);
    }

    function sortByPriority(a, b) {
      return (b.priority || 0) - (a.priority || 0) || normalize(a.displayName).localeCompare(normalize(b.displayName));
    }

    function getDisplayName(item) {
      return normalize(item.displayName || item.title || item.groupName || item.sectionLabel || "Item");
    }

    function getLocationParts(item) {
      if (item.locationDisplay) return item.locationDisplay.split("·").map(part => part.trim()).filter(Boolean);

      if (item.areaType === "aisle") {
        return [
          `A${item.aisle}`,
          item.sectionLabel,
          item.bay ? `Bay ${item.bay}` : "",
          displayHorizontal(item.horizontal),
          displayVertical(item.vertical)
        ].filter(Boolean);
      }

      if (item.areaType === "right-med") return ["Right Side", item.sectionLabel, displayHorizontal(item.horizontal), displayVertical(item.vertical)];
      if (item.areaType === "pharmacy") return ["Pharmacist"];
      if (item.areaType === "household") return ["Household", displayHorizontal(item.horizontal), displayVertical(item.vertical)];
      if (item.areaType === "till2") return ["Till 2"];
      if (item.areaType === "checkout") return ["Checkout"];
      return [item.sectionLabel || item.areaType].filter(Boolean);
    }

    function getLocationText(item) {
      return getLocationParts(item).join(" · ");
    }

    function makeZoneBox(zone, isTarget, className) {
      const div = document.createElement("div");
      div.className = `${className} ${isTarget ? "target" : ""}`;
      div.textContent = zone.label;
      return div;
    }

    function buildLeftZones(targetItem) {
      leftZonesBox.innerHTML = "";
      leftZones.forEach(zone => {
        const isTarget = targetItem && targetItem.areaType === "checkout" && targetItem.zoneId === zone.id;
        leftZonesBox.appendChild(makeZoneBox(zone, isTarget, "zone-box"));
      });
    }

    function buildRightMedZones(targetItem) {
      rightMedZonesBox.innerHTML = "";
      rightMedZones.forEach(zone => {
        const isTarget = targetItem && targetItem.areaType === "right-med" && targetItem.zoneId === zone.id;
        rightMedZonesBox.appendChild(makeZoneBox(zone, isTarget, "med-box"));
      });
    }

    function buildPharmacyZones(targetItem) {
      pharmacyZonesBox.innerHTML = "";
      pharmacyZones.forEach(zone => {
        const isTarget = targetItem && targetItem.areaType === "pharmacy" && targetItem.zoneId === zone.id;
        pharmacyZonesBox.appendChild(makeZoneBox(zone, isTarget, "pharmacy-box"));
      });
    }

    function householdColumnFromHorizontal(value) {
      const v = normalizeKey(value || "middle");
      if (["left", "1", "col1"].includes(v)) return "left";
      if (["right", "3", "col3"].includes(v)) return "right";
      return "middle";
    }

    function householdRowFromVertical(value) {
      const v = normalizeKey(value || "middle");
      if (["top", "upper", "1", "row1"].includes(v)) return "top";
      if (["bottom", "lower", "3", "row3"].includes(v)) return "bottom";
      return "middle";
    }

    function buildHouseholdBox(targetItem) {
      const parts = [
        { id: "left", label: "Left" },
        { id: "middle", label: "Middle" },
        { id: "right", label: "Right" }
      ];
      const rows = [
        { id: "top", label: "Top" },
        { id: "middle", label: "Middle" },
        { id: "bottom", label: "Bottom" }
      ];

      const isHouseholdTarget = Boolean(targetItem && targetItem.areaType === "household");
      const targetPart = isHouseholdTarget ? householdColumnFromHorizontal(targetItem.horizontal) : "";
      const targetRow = isHouseholdTarget ? householdRowFromVertical(targetItem.vertical) : "";

      householdBox.classList.remove("target", "household-active", "household-target");

      if (!isHouseholdTarget) {
        householdBox.innerHTML = "Household";
        return;
      }

      householdBox.classList.add("household-active", "household-target");
      householdBox.innerHTML = parts.map(part => `
        <div class="household-part">
          <div class="household-part-title">${part.label}</div>
          <div class="household-cells">
            ${rows.map(row => {
              const isTargetCell = part.id === targetPart && row.id === targetRow;
              return `<div class="household-cell ${isTargetCell ? "target-household-cell" : ""}">${isTargetCell ? "ITEM" : row.label}</div>`;
            }).join("")}
          </div>
        </div>
      `).join("");
    }

    function buildSideZones(targetItem) {
      buildHouseholdBox(targetItem);
      till2Box.classList.toggle("target", Boolean(targetItem && targetItem.areaType === "till2"));

      const isA3B3Target = Boolean(
        targetItem &&
        targetItem.areaType === "aisle" &&
        Number(targetItem.aisle) === 3 &&
        normalizeKey(targetItem.side) === "bottom" &&
        normalize(targetItem.section) === "B3"
      );

      a3b3Box.classList.remove("target", "target-section");
      if (isA3B3Target) {
        a3b3Box.classList.add("target-section");
        a3b3Box.innerHTML = buildSectionDetail(targetItem);
      } else {
        a3b3Box.innerHTML = "Pain & Wound Care";
      }
    }

    function cellKey(horizontal, vertical) {
      return `${normalizeKey(horizontal)}-${normalizeKey(vertical)}`;
    }

    function buildSectionDetail(item) {
      const targetHorizontal = normalizeKey(item.horizontal || "middle");
      const targetVertical = normalizeKey(item.vertical || "middle");
      const horizontals = ["left", "middle", "right"];
      const verticals = ["top", "middle", "bottom"];
      let html = `<div class="section-detail">`;
      verticals.forEach(vertical => {
        horizontals.forEach(horizontal => {
          const isTargetCell = cellKey(horizontal, vertical) === cellKey(targetHorizontal, targetVertical);
          html += `<div class="section-cell ${isTargetCell ? "target-cell" : ""}">${isTargetCell ? "ITEM" : ""}</div>`;
        });
      });
      html += `</div>`;
      return html;
    }

    function buildShelfSide(sections, sideName, aisleNumber, targetItem) {
      const countClass = sections.length === 2 ? "two" : "three";
      const html = sections.map(section => {
        const isTarget =
          targetItem &&
          targetItem.areaType === "aisle" &&
          Number(targetItem.aisle) === Number(aisleNumber) &&
          normalizeKey(targetItem.side) === sideName &&
          normalizeKey(targetItem.section) === normalizeKey(section.id);

        if (isTarget) return `<div class="shelf-section target-section">${buildSectionDetail(targetItem)}</div>`;
        return `<div class="shelf-section">${section.label}</div>`;
      }).join("");
      return `<div class="shelf-side ${countClass}">${html}</div>`;
    }

    function buildAisleGroup(container, aisleList, targetItem) {
      container.innerHTML = "";
      aisleList.forEach(aisle => {
        const isActiveAisle = targetItem && targetItem.areaType === "aisle" && Number(targetItem.aisle) === Number(aisle.aisle);
        const aisleColor = getAisleColor(aisle.aisle);
        const row = document.createElement("div");
        row.className = `aisle-block ${isActiveAisle ? "active-aisle" : ""}`;
        row.innerHTML = `
          <div class="aisle-body">
            ${buildShelfSide(aisle.top, "top", aisle.aisle, targetItem)}
            <div class="walkway" style="background:${aisleColor};">A${aisle.aisle}</div>
            ${buildShelfSide(aisle.bottom, "bottom", aisle.aisle, targetItem)}
          </div>
        `;
        container.appendChild(row);
      });
    }

    function buildMap(targetItem) {
      buildLeftZones(targetItem);
      buildAisleGroup(upperAisleMap, aisles.filter(a => a.aisle <= 3), targetItem);
      buildAisleGroup(lowerAisleMap, aisles.filter(a => a.aisle >= 4), targetItem);
      buildSideZones(targetItem);
      buildRightMedZones(targetItem);
      buildPharmacyZones(targetItem);
    }

    function renderAnswer(item) {
      const parts = getLocationParts(item);
      const firstPart = parts[0] || "Location";
      const otherParts = parts.slice(1);
      const aisleMatch = firstPart.match(/^A(\d+)/);
      const chipColor = aisleMatch ? getAisleColor(Number(aisleMatch[1])) : "var(--blue)";

      const locationHTML = `
        <div class="big-location">
          <span class="location-chip" style="background:${chipColor}">${firstPart}</span>
          ${otherParts.map(part => `<span class="location-segment">${part}</span>`).join("")}
        </div>
      `;

      const showWarning = item.showWarning || item.advice || item.pharmacistOnly || item.ageRestricted;
      const message = item.ruleMessage || "Ask staff if needed.";

      answerBox.innerHTML = `
        <section class="answer-card">
          <div class="answer-label">Best match</div>
          <h2 class="answer-title">${getDisplayName(item)}</h2>
          ${locationHTML}
          ${showWarning ? `<div class="warning">${message}</div>` : ""}
        </section>
      `;
    }

    function renderResults(list, activeId) {
      if (list.length <= 1) {
        resultList.innerHTML = `<div class="empty">No other matches.</div>`;
        return;
      }

      resultList.innerHTML = "";
      list.forEach(item => {
        const div = document.createElement("div");
        div.className = `match-item ${item.id === activeId ? "active" : ""}`;
        const aisleColor = item.areaType === "aisle" ? getAisleColor(Number(item.aisle)) : "var(--blue)";
        const chip = item.areaType === "aisle" ? `<span class="aisle-mini-chip" style="background:${aisleColor};">A${item.aisle}</span>` : "";

        div.innerHTML = `
          <span class="match-title">${getDisplayName(item)}</span>
          <div class="match-location">${chip}<span>${getLocationText(item)}</span></div>
        `;

        div.onclick = () => selectItem(item, list);
        resultList.appendChild(div);
      });
    }

    function selectItem(item, list) {
      renderAnswer(item);
      buildMap(item);
      renderResults(list || [item], item.id);
    }

    function directScore(item, query, expandedTerms) {
      const q = normalizeKey(query);
      if (!q) return 0;

      if (item._displayNameKey === q || item._titleKey === q) return 1000;
      if (item._brandKey === q) return 650;
      if (item._displayNameKey.includes(q) || item._titleKey.includes(q)) return 450;
      if (item._aliasesKey.includes(q)) return 340;
      if (item._symptomsKey.includes(q)) return 320;
      if (item._activeIngredientKey.includes(q)) return 300;
      if (item._brandKey.includes(q)) return 260;
      if (item._keywordsKey.includes(q)) return 220;
      if (item._searchTextKey.includes(q)) return 160;

      const expandedHitCount = expandedTerms.filter(term => item._searchTextKey.includes(term)).length;
      if (expandedHitCount >= 2) return 170 + expandedHitCount;
      if (expandedHitCount === 1) return 130;
      return 0;
    }

    function searchItems() {
      const query = searchInput.value.trim();
      const normalizedQuery = normalizeKey(query);

      if (normalizedQuery === lastSearchQuery) return;
      lastSearchQuery = normalizedQuery;

      if (!query) {
        const list = [...items].sort(sortByPriority).slice(0, 8);
        lastSearchResults = list;
        if (list.length) selectItem(list[0], list);
        return;
      }

      const expandedQuery = expandQueryWithSynonyms(query);
      const expandedTerms = expandedQuery.split(/\s+/).filter(Boolean);

      const directMatches = [];
      for (const item of items) {
        const score = directScore(item, query, expandedTerms);
        if (score > 0) directMatches.push({ ...item, _directScore: score });
      }

      directMatches.sort((a, b) => {
        const directDiff = (b._directScore || 0) - (a._directScore || 0);
        if (directDiff) return directDiff;
        return sortByPriority(a, b);
      });

      let results = directMatches.slice(0, 8);

      // Fuse fuzzy search is slower, so only use it when direct matching does not find enough results.
      if (results.length < 8 && fuse) {
        const searchQuery = expandedQuery || query;
        const fuseResults = fuse.search(searchQuery, { limit: 8 }).map(result => ({ ...result.item, _score: result.score }));

        const byId = new Map(results.map(item => [item.id, item]));
        fuseResults.forEach(item => {
          if (!byId.has(item.id)) byId.set(item.id, item);
        });

        results = Array.from(byId.values())
          .sort((a, b) => {
            const directDiff = (b._directScore || 0) - (a._directScore || 0);
            if (directDiff) return directDiff;
            const fuseDiff = (a._score ?? 1) - (b._score ?? 1);
            if (fuseDiff) return fuseDiff;
            return sortByPriority(a, b);
          })
          .slice(0, 8);
      }

      lastSearchResults = results;

      if (!results.length) {
        answerBox.innerHTML = `<section class="answer-card"><div class="empty">No result found.<br>Try product name, brand name, symptom, ingredient, or category.</div></section>`;
        buildMap(null);
        resultList.innerHTML = "";
        return;
      }

      selectItem(results[0], results);
    }

    searchBtn.addEventListener("click", searchItems);
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(searchItems, 450);
    });

    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        clearTimeout(searchTimer);
        lastSearchQuery = null;
        searchItems();
      }
    });

    updateServedCounter();
    loadData().catch(error => {
      console.error(error);
      answerBox.innerHTML = `
        <section class="answer-card">
          <div class="empty">
            Failed to load CSV files.<br>
            Make sure index.html, products.csv, product_groups.csv, locations.csv, synonyms.csv, rules.csv, papaparse.min.js, and fuse.min.js are in the same folder.
          </div>
        </section>
      `;
      buildMap(null);
    });
  </script>
</body>
</html>
